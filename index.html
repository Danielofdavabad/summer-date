<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دعوت به قرار تابستونی | Hello Kimia</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .splash-content {
            text-align: center;
        }

        .hello-kimia {
            font-family: 'Dancing Script', 'Pacifico', 'Vazirmatn', cursive;
            font-size: 4rem;
            font-weight: bold;
            color: #ff8c00;
            text-shadow: 2px 2px 8px rgba(255, 140, 0, 0.2);
            background: transparent;
            display: inline-block;
            padding: 0 20px;
            border-radius: 80px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #ff8c00;
            animation: blinkCursor 0.7s step-end infinite;
        }

        @keyframes blinkCursor {
            0%, 100% { border-color: #ff8c00; }
            50% { border-color: transparent; }
        }

        .splash-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.1);
            padding: 40px 30px 50px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            z-index: 2;
            transition: all 0.3s ease;
            border: 2px solid #ffcc80;
        }

        .flower {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 2rem;
            opacity: 0.6;
            z-index: 1;
        }

        .hi-kimia {
            font-family: 'Dancing Script', 'Pacifico', 'Vazirmatn', cursive;
            font-size: 3.2rem;
            font-weight: bold;
            color: #9b59b6;
            text-shadow: 2px 2px 8px rgba(155, 89, 182, 0.3);
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.4);
            display: inline-block;
            padding: 0 20px;
            border-radius: 80px;
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #e67e22;
            margin: 15px 0 10px;
            text-shadow: 2px 2px 0 #ffe0a3;
            display: block;
        }

        .question {
            font-size: 1.8rem;
            font-weight: 800;
            background: #fff0d4;
            padding: 20px;
            border-radius: 50px;
            margin: 25px 0 35px;
            color: #c0392b;
            box-shadow: inset 0 -2px 0 #f0c0a0, 0 10px 15px -5px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            position: relative;
            min-height: 100px;
        }

        .btn {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            font-family: 'Vazirmatn', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-yes {
            background-color: #2ecc71;
            color: white;
            text-shadow: 0 1px 1px green;
        }
        .btn-yes:hover {
            background-color: #27ae60;
            transform: scale(1.03);
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
            text-shadow: 0 1px 1px #8b0000;
            position: fixed;
            z-index: 100;
            transition: all 0.05s linear;
            will-change: left, top;
        }
        
        .btn-no span {
            font-size: 1.5rem;
        }

        .temp-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #c0392b, #e67e22);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (max-width: 550px) {
            .temp-message { font-size: 0.8rem; padding: 8px 18px; white-space: nowrap; }
        }

        .date-page {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8e0 100%);
            border: 2px solid #c0392b;
            box-shadow: 0 20px 35px rgba(192, 57, 43, 0.15);
        }
        
        .date-page::before { content: "⏳"; position: absolute; bottom: 15px; left: 20px; font-size: 5rem; opacity: 0.12; pointer-events: none; transform: rotate(-15deg); }
        .date-page::after { content: "🌹"; position: absolute; top: 15px; right: 20px; font-size: 4.5rem; opacity: 0.15; pointer-events: none; transform: rotate(10deg); }
        
        .date-question {
            font-size: 1.8rem;
            font-weight: 800;
            color: #c0392b;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .calendar-container {
            background: rgba(255, 248, 240, 0.95);
            border-radius: 40px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e67e22;
            direction: rtl;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        
        .calendar-nav-btn {
            background: #e67e22;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .calendar-nav-btn:hover { background: #c0392b; transform: scale(1.05); }
        
        .calendar-month-year {
            font-size: 1.2rem;
            font-weight: 800;
            color: #8b3a2b;
        }
        
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .calendar-weekdays div {
            font-weight: 700;
            color: #c0392b;
            padding: 5px;
            font-size: 0.85rem;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            color: #5a2a1a;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .calendar-day:hover {
            background: #ffd4a5;
            transform: scale(1.05);
        }
        
        .calendar-day.selected {
            background: #c0392b;
            color: white;
            box-shadow: 0 2px 8px rgba(192,57,43,0.3);
        }
        
        .calendar-day.empty {
            cursor: default;
            opacity: 0.3;
        }
        
        .calendar-day.empty:hover {
            background: transparent;
            transform: none;
        }
        
        .clock-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        
        canvas {
            background: #fffef7;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 0 0 8px #f5e6d3, inset 0 0 0 12px #e6ccb3;
            cursor: grab;
        }
        
        canvas:active { cursor: grabbing; }
        
        .selected-time {
            margin-top: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #c0392b;
            background: rgba(255,245,235,0.9);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
        }
        
        .confirm-btn {
            background: linear-gradient(135deg, #c0392b, #e67e22);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(192,57,43,0.3);
        }
        
        .confirm-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(192,57,43,0.4);
        }
        
        .page-panel {
            margin-top: 30px;
            background: rgba(255, 250, 225, 0.98);
            border-radius: 50px;
            padding: 25px;
            border: 2px solid #ffcc80;
            animation: fadeSlideUp 0.5s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; font-weight: 700; color: #b64926; margin-bottom: 8px; font-size: 1.1rem; }
        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: flex-start; margin-top: 8px; }
        .radio-group label { font-weight: 600; display: inline-flex; align-items: center; gap: 6px; background: #fff3e0; padding: 6px 18px; border-radius: 40px; cursor: pointer; transition: all 0.2s; }
        .radio-group label:hover { background: #ffe0b3; transform: scale(1.02); }
        .radio-group input { width: auto; margin: 0; }
        .next-step-btn { background: #e67e22; color: white; font-size: 1.2rem; font-weight: 700; padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer; margin-top: 15px; width: 100%; transition: 0.2s; }
        .next-step-btn:hover { background: #d35400; transform: scale(1.02); }
        
        .final-success {
            margin-top: 20px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 20px;
            border-radius: 40px;
            text-align: center;
            font-weight: 600;
            animation: bounce 0.5s;
            line-height: 1.8;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(46,204,113,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .coordinate-btn {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(230,126,34,0.3);
        }
        
        .coordinate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230,126,34,0.4);
            background: linear-gradient(135deg, #d35400, #b83e00);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .back-btn { background: #ecf0f1; color: #7f8c8d; border: none; border-radius: 30px; padding: 6px 15px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-bottom: 15px; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .back-btn:hover { background: #bdc3c7; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .step-title { font-size: 1.4rem; font-weight: 800; color: #e67e22; }
        .initial-page { display: block; }

        @media (max-width: 550px) {
            .card { padding: 25px 20px; }
            .hello-kimia { font-size: 2.2rem; white-space: normal; }
            .main-title { font-size: 1.6rem; }
            .question { font-size: 1.3rem; }
            .btn { font-size: 1.2rem; padding: 8px 24px; }
            .buttons { gap: 20px; }
            .date-question { font-size: 1.4rem; }
            .calendar-day { font-size: 0.7rem; }
            canvas { width: 200px; height: 200px; }
            .final-success { font-size: 0.85rem; padding: 15px; }
            .coordinate-btn { font-size: 0.9rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
    <div class="splash-content">
        <div class="hello-kimia" id="helloText"></div>
    </div>
</div>

<div class="flower">🌸🍉🌞🍦</div>

<div class="card" id="mainCard" style="display: none;">
    
    <div id="initialPage">
        <div class="hi-kimia">✨ Hi Kimia ✨</div>
        <div class="main-title">🍧 یه سوال ازت داشتم 🍦</div>
        <div class="question" id="questionDiv">با من میای سر قرار؟</div>
        <div class="buttons" id="initialButtons">
            <button class="btn btn-yes" id="yesBtn">ببینم چی میشه</button>
            <button class="btn btn-no" id="noBtn"><span>❌</span> نه</button>
        </div>
    </div>
    
    <div id="page1" class="page-panel date-page" style="display: none;">
        <div class="nav-header">
            <button class="back-btn" id="backToMain1">↩ بازگشت</button>
            <div class="step-title">⏳🌹</div>
        </div>
        
        <div class="date-question">📅 چه روزی فری هستی؟</div>
        
        <div class="calendar-container">
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="prevMonthBtn">◀</button>
                <span class="calendar-month-year" id="monthYearDisplay"></span>
                <button class="calendar-nav-btn" id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-weekdays">
                <div>ش</div><div>ی</div><div>د</div><div>س</div><div>چ</div><div>پ</div><div>ج</div>
            </div>
            <div class="calendar-days" id="calendarDays"></div>
        </div>
        
        <div class="clock-container">
            <canvas id="analogClock" width="220" height="220" style="width:220px; height:220px"></canvas>
        </div>
        <div class="selected-time" id="selectedTimeDisplay">ساعت انتخاب شده: ۱۹:۰۰</div>
        
        <button id="saveDateBtn" class="confirm-btn">
            <span>🌹</span> باشه حالا <span>⏳</span>
        </button>
    </div>
    
    <div id="page2" class="page-panel" style="display: none;">
        <div class="nav-header">
            <button class="back-btn" id="backToPage1">↩ بازگشت به تاریخ</button>
            <div class="step-title">🍽️ کدومو ترجیح میدی؟</div>
        </div>
        <div class="form-group">
            <label>چی دوست داری؟</label>
            <div class="radio-group" id="mealGroup">
                <label><input type="radio" name="meal" value="چایی و قهوه" id="teaCoffeeRadio"> چایی و قهوه</label>
                <label><input type="radio" name="meal" value="ناهار" id="lunchRadio"> ناهار</label>
                <label><input type="radio" name="meal" value="صبحونه" id="breakfastRadio" checked> صبحونه</label>
            </div>
        </div>
        <button id="saveMealBtn" class="next-step-btn">🍴 اوکی</button>
    </div>
    
    <div id="page3" class="page-panel" style="display: none;">
        <div class="nav-header">
            <button class="back-btn" id="backToPage2">↩ بازگشت به خوراکی</button>
            <div class="step-title">🤞 بهم تقلب برسون 🤞</div>
        </div>
        <div class="form-group">
            <label>گل مورد علاقه‌ات:</label>
            <select id="flowerSelect" style="width: 100%; padding: 12px; border-radius: 40px; border:1px solid #ffb347;">
                <option value="رز سرخ">🌹 رز سرخ</option>
                <option value="لاله">🌷 لاله</option>
                <option value="لیلیوم">🌸 لیلیوم</option>
                <option value="میخک">🌸 میخک</option>
                <option value="نرگس">🌼 نرگس</option>
                <option value="یاس">🤍 یاس</option>
                <option value="مریم">🤍 مریم</option>
                <option value="گل محمدی">🌹 گل محمدی</option>
                <option value="سنبل">💜 سنبل</option>
                <option value="زنبق">💙 زنبق</option>
                <option value="آفتابگردان">🌻 آفتابگردان</option>
            </select>
        </div>
        <button id="submitFinalBtn" class="next-step-btn">ببینم چی میشه دیگه</button>
        <div id="finalSuccessMsg" class="final-success" style="display: none;"></div>
    </div>
    
</div>

<div id="tempMessage" class="temp-message"></div>

<script>
    (function() {
        // ==================== تقویم شمسی ====================
        let currentYear = 1405;
        let currentMonth = 4;
        let selectedDay = 15;
        
        const monthNames = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور'];
        
        function getDaysInMonth(month) {
            if (month <= 6) return 31;
            return 30;
        }
        
        function getFirstDayWeekday(year, month) {
            let daysDiff = 0;
            for (let m = 4; m < month; m++) {
                daysDiff += getDaysInMonth(m);
            }
            let firstDay = (6 + daysDiff) % 7;
            return firstDay;
        }
        
        function renderCalendar() {
            const daysInMonth = getDaysInMonth(currentMonth);
            const startEmpty = getFirstDayWeekday(currentYear, currentMonth);
            
            document.getElementById('monthYearDisplay').innerHTML = `${monthNames[currentMonth-1]} ${currentYear}`;
            
            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';
            
            for (let i = 0; i < startEmpty; i++) {
                let emptyDiv = document.createElement('div');
                emptyDiv.classList.add('calendar-day', 'empty');
                calendarDays.appendChild(emptyDiv);
            }
            
            for (let d = 1; d <= daysInMonth; d++) {
                let dayDiv = document.createElement('div');
                dayDiv.classList.add('calendar-day');
                dayDiv.textContent = d;
                if (d === selectedDay) {
                    dayDiv.classList.add('selected');
                }
                dayDiv.addEventListener('click', (function(day) {
                    return function() { selectDay(day); };
                })(d));
                calendarDays.appendChild(dayDiv);
            }
        }
        
        function selectDay(day) {
            selectedDay = day;
            renderCalendar();
            showTempMessage(`بالاخره یک روز خوب ${convertToPersianNumbers(currentYear)}/${convertToPersianNumbers(currentMonth)}/${convertToPersianNumbers(day)}`);
        }
        
        function convertToPersianNumbers(str) {
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return str.toString().replace(/[0-9]/g, function(d) {
                return persianDigits[parseInt(d)];
            });
        }
        
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            if (currentMonth > 4) {
                currentMonth--;
                renderCalendar();
            }
        });
        
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            if (currentMonth < 6) {
                currentMonth++;
                renderCalendar();
            }
        });
        
        // ==================== ساعت آنالوگ ====================
        const canvas = document.getElementById('analogClock');
        const ctx = canvas.getContext('2d');
        let clockRadius = 100;
        let centerX = 110, centerY = 110;
        
        let selectedHour24 = 19;
        let selectedMinute = 0;
        
        let isDragging = false;
        let draggingHand = null;
        
        function hour24ToAngle(hour24, minute) {
            let hour12 = hour24 % 12;
            if (hour12 === 0) hour12 = 12;
            return (hour12 + minute / 60) * 30 - 90;
        }
        
        function angleToHour24(angle) {
            let hour12 = Math.round(angle / 30) % 12;
            if (hour12 === 0) hour12 = 12;
            
            let currentHour12 = selectedHour24 % 12;
            if (currentHour12 === 0) currentHour12 = 12;
            
            let newHour24 = selectedHour24 - currentHour12 + hour12;
            
            if (newHour24 < 8) newHour24 += 12;
            if (newHour24 > 20) newHour24 -= 12;
            if (newHour24 < 8) newHour24 = 8;
            if (newHour24 > 20) newHour24 = 20;
            
            return newHour24;
        }
        
        function drawClock() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, clockRadius, 0, 2 * Math.PI);
            ctx.fillStyle = '#fffef7';
            ctx.fill();
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.font = 'bold 14px Vazirmatn';
            ctx.fillStyle = '#5a2a1a';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 1; i <= 12; i++) {
                let angle = (i * 30 - 90) * Math.PI / 180;
                let x = centerX + Math.cos(angle) * (clockRadius - 25);
                let y = centerY + Math.sin(angle) * (clockRadius - 25);
                ctx.fillText(i.toString(), x, y);
            }
            
            for (let i = 0; i < 60; i++) {
                let angle = (i * 6 - 90) * Math.PI / 180;
                let startX = centerX + Math.cos(angle) * (clockRadius - 12);
                let startY = centerY + Math.sin(angle) * (clockRadius - 12);
                let endX = centerX + Math.cos(angle) * (clockRadius - 5);
                let endY = centerY + Math.sin(angle) * (clockRadius - 5);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = '#b64926';
                ctx.lineWidth = i % 5 === 0 ? 2 : 1;
                ctx.stroke();
            }
            
            let hourAngle = hour24ToAngle(selectedHour24, selectedMinute);
            let hourRad = hourAngle * Math.PI / 180;
            let hourX = centerX + Math.cos(hourRad) * (clockRadius - 45);
            let hourY = centerY + Math.sin(hourRad) * (clockRadius - 45);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(hourX, hourY);
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 5;
            ctx.stroke();
            
            let minuteAngle = selectedMinute * 6 - 90;
            let minuteRad = minuteAngle * Math.PI / 180;
            let minuteX = centerX + Math.cos(minuteRad) * (clockRadius - 25);
            let minuteY = centerY + Math.sin(minuteRad) * (clockRadius - 25);
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(minuteX, minuteY);
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#c0392b';
            ctx.fill();
            
            let hourPersian = convertToPersianNumbers(selectedHour24.toString().padStart(2,'0'));
            let minutePersian = convertToPersianNumbers(selectedMinute.toString().padStart(2,'0'));
            let timeDisplay = document.getElementById('selectedTimeDisplay');
            if (timeDisplay) timeDisplay.innerHTML = `ساعت انتخاب شده: ${hourPersian}:${minutePersian}`;
        }
        
        function getAngleFromClick(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (clientX - rect.left) * scaleX;
            let mouseY = (clientY - rect.top) * scaleY;
            let dx = mouseX - centerX;
            let dy = mouseY - centerY;
            let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
            if (angle < 0) angle += 360;
            return angle;
        }
        
        function getHandFromAngle(angle) {
            let hourHandAngle = hour24ToAngle(selectedHour24, selectedMinute);
            let minuteHandAngle = selectedMinute * 6;
            let distHour = Math.abs(angle - hourHandAngle);
            let distMinute = Math.abs(angle - minuteHandAngle);
            return distHour < distMinute ? 'hour' : 'minute';
        }
        
        function updateTimeFromAngle(angle, hand) {
            if (hand === 'hour') {
                let newHour24 = angleToHour24(angle);
                if (newHour24 !== selectedHour24) {
                    selectedHour24 = newHour24;
                }
            } else {
                let newMinute = Math.round(angle / 6) % 60;
                if (newMinute !== selectedMinute) {
                    selectedMinute = newMinute;
                }
            }
            drawClock();
        }
        
        function onMouseMove(e) {
            if (!isDragging) return;
            let clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
            let clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            let angle = getAngleFromClick(clientX, clientY);
            updateTimeFromAngle(angle, draggingHand);
        }
        
        function onMouseUp() {
            isDragging = false;
            draggingHand = null;
            canvas.removeEventListener('mousemove', onMouseMove);
            canvas.removeEventListener('touchmove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
            document.removeEventListener('touchend', onMouseUp);
        }
        
        function onMouseDown(e) {
            e.preventDefault();
            let clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
            let clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            let angle = getAngleFromClick(clientX, clientY);
            draggingHand = getHandFromAngle(angle);
            isDragging = true;
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('touchmove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchend', onMouseUp);
        }
        
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('touchstart', onMouseDown);
        
        // ==================== پیام‌های بامزه ====================
        function showFunnyMealMessage(meal) {
            const hour = selectedHour24;
            
            if (meal === 'صبحونه' && (hour < 8 || hour >= 10)) {
                showTempMessage('🍳 قهرمان صبحونه‌های نامتعارف! به به 😎');
                return true;
            }
            else if (meal === 'ناهار' && (hour < 12 || hour >= 16)) {
                showTempMessage('🍝 ناهار این موقع؟! تو یه آدم خاصی هستی میدونستی؟ ✨');
                return true;
            }
            return false;
        }
        
        function showTeaCoffeeMessage() {
            showTempMessage('🍵 تا خورشید از رو بره ☕');
        }
        
        // ==================== دکمه نه با محدودیت محکم ====================
        function showTempMessage(message) {
            const tempMsg = document.getElementById('tempMessage');
            tempMsg.textContent = message;
            tempMsg.style.opacity = '1';
            setTimeout(() => {
                tempMsg.style.opacity = '0';
            }, 2500);
        }
        
        const helloElement = document.getElementById('helloText');
        const fullText = "Hello Kimia";
        let idx = 0;
        function typeWriter() {
            if (idx < fullText.length) {
                helloElement.innerHTML += fullText.charAt(idx);
                idx++;
                setTimeout(typeWriter, 120);
            }
        }
        typeWriter();
        
        const splashScreenDiv = document.getElementById('splashScreen');
        const mainCardDiv = document.getElementById('mainCard');
        const initialPageDiv = document.getElementById('initialPage');
        const page1Div = document.getElementById('page1');
        const page2Div = document.getElementById('page2');
        const page3Div = document.getElementById('page3');
        
        function showMainPage() {
            splashScreenDiv.classList.add('hide');
            setTimeout(() => {
                splashScreenDiv.style.display = 'none';
                mainCardDiv.style.display = 'block';
                tinyConfetti();
                setTimeout(() => {
                    if (noBtn) initNoBtnPosition();
                }, 100);
            }, 500);
        }
        
        splashScreenDiv.addEventListener('click', showMainPage);
        
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const initialButtonsDiv = document.getElementById('initialButtons');
        const backToMain1 = document.getElementById('backToMain1');
        const backToPage1Btn = document.getElementById('backToPage1');
        const backToPage2Btn = document.getElementById('backToPage2');
        
        let userData = { date: '', time: '', meal: 'صبحونه', flower: '' };
        
        // ========== محدودیت قوی برای دکمه نه ==========
        let btnX = 0, btnY = 0;
        let targetX = 0, targetY = 0;
        let isMovingBtn = false;
        let animFrame = null;
        let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
        const SAFE_MARGIN = 12;
        
        function getBtnBounds() { 
            if (!noBtn) return { width: 100, height: 50 };
            return { width: noBtn.offsetWidth, height: noBtn.offsetHeight }; 
        }
        
        function applyBoundary(x, y) {
            const bounds = getBtnBounds();
            let newX = x;
            let newY = y;
            
            if (newX < SAFE_MARGIN) newX = SAFE_MARGIN;
            if (newX + bounds.width > window.innerWidth - SAFE_MARGIN) {
                newX = window.innerWidth - bounds.width - SAFE_MARGIN;
            }
            if (newY < SAFE_MARGIN) newY = SAFE_MARGIN;
            if (newY + bounds.height > window.innerHeight - SAFE_MARGIN) {
                newY = window.innerHeight - bounds.height - SAFE_MARGIN;
            }
            
            return { x: newX, y: newY };
        }
        
        function setBtnPosition(x, y, instant = false) {
            const bounded = applyBoundary(x, y);
            btnX = bounded.x;
            btnY = bounded.y;
            
            if (instant) {
                noBtn.style.left = btnX + 'px';
                noBtn.style.top = btnY + 'px';
                targetX = btnX;
                targetY = btnY;
            } else {
                targetX = btnX;
                targetY = btnY;
                if (!isMovingBtn) {
                    isMovingBtn = true;
                    startSmoothMove();
                }
            }
        }
        
        function startSmoothMove() {
            if (animFrame) cancelAnimationFrame(animFrame);
            
            function smooth() {
                if (!noBtn) return;
                
                let curLeft = parseFloat(noBtn.style.left);
                let curTop = parseFloat(noBtn.style.top);
                
                if (isNaN(curLeft)) curLeft = btnX;
                if (isNaN(curTop)) curTop = btnY;
                
                let dx = targetX - curLeft;
                let dy = targetY - curTop;
                
                let newLeft = curLeft + dx * 0.35;
                let newTop = curTop + dy * 0.35;
                
                const bounded = applyBoundary(newLeft, newTop);
                
                noBtn.style.left = bounded.x + 'px';
                noBtn.style.top = bounded.y + 'px';
                
                if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                    animFrame = requestAnimationFrame(smooth);
                } else {
                    noBtn.style.left = targetX + 'px';
                    noBtn.style.top = targetY + 'px';
                    isMovingBtn = false;
                    animFrame = null;
                }
            }
            smooth();
        }
        
        function initNoBtnPosition() {
            if (!noBtn || !initialButtonsDiv) return;
            const containerRect = initialButtonsDiv.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            let leftPos = containerRect.left + containerRect.width - btnRect.width - 20;
            let topPos = containerRect.top + 10;
            
            const bounded = applyBoundary(leftPos, topPos);
            btnX = bounded.x;
            btnY = bounded.y;
            targetX = btnX;
            targetY = btnY;
            noBtn.style.left = btnX + 'px';
            noBtn.style.top = btnY + 'px';
            noBtn.style.position = 'fixed';
        }
        
        document.addEventListener('mousemove', (e) => {
            if (!noBtn || noBtn.style.display === 'none') return;
            
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            const btnRect = noBtn.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            const dist = Math.hypot(mouseX - btnCenterX, mouseY - btnCenterY);
            
            if (dist < 180) {
                const angle = Math.atan2(btnCenterY - mouseY, btnCenterX - mouseX);
                const force = Math.min(45, 250 / (dist + 8));
                let newX = btnX + Math.cos(angle) * force;
                let newY = btnY + Math.sin(angle) * force;
                setBtnPosition(newX, newY);
            }
        });
        
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const randomAngle = Math.random() * Math.PI * 2;
            let newX = btnX + Math.cos(randomAngle) * 40;
            let newY = btnY + Math.sin(randomAngle) * 40;
            setBtnPosition(newX, newY);
            noBtn.style.transform = 'rotate(8deg) scale(0.92)';
            setTimeout(() => { if(noBtn) noBtn.style.transform = ''; }, 150);
            return false;
        });
        
        noBtn.addEventListener('mouseenter', () => {
            if (!noBtn) return;
            const btnRect = noBtn.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;
            const angle = Math.atan2(btnCenterY - mouseY, btnCenterX - mouseX);
            let newX = btnX + Math.cos(angle) * 25;
            let newY = btnY + Math.sin(angle) * 25;
            setBtnPosition(newX, newY);
        });
        
        window.addEventListener('resize', () => {
            if (noBtn && noBtn.style.display !== 'none') {
                initNoBtnPosition();
            }
        });
        
        function showPage1() {
            initialPageDiv.style.display = 'none';
            page1Div.style.display = 'block';
            page2Div.style.display = 'none';
            page3Div.style.display = 'none';
            if(noBtn) noBtn.style.display = 'none';
            renderCalendar();
            drawClock();
        }
        
        function showPage2() {
            initialPageDiv.style.display = 'none';
            page1Div.style.display = 'none';
            page2Div.style.display = 'block';
            page3Div.style.display = 'none';
            if(noBtn) noBtn.style.display = 'none';
            const currentMeal = document.querySelector('input[name="meal"]:checked');
            if (currentMeal) {
                if (currentMeal.value === 'چایی و قهوه') {
                    showTeaCoffeeMessage();
                } else if (currentMeal.value === 'صبحونه' || currentMeal.value === 'ناهار') {
                    showFunnyMealMessage(currentMeal.value);
                }
            }
        }
        
        function showPage3() {
            initialPageDiv.style.display = 'none';
            page1Div.style.display = 'none';
            page2Div.style.display = 'none';
            page3Div.style.display = 'block';
            if(noBtn) noBtn.style.display = 'none';
        }
        
        const teaCoffeeRadio = document.getElementById('teaCoffeeRadio');
        const lunchRadio = document.getElementById('lunchRadio');
        const breakfastRadio = document.getElementById('breakfastRadio');
        
        teaCoffeeRadio.addEventListener('change', function() {
            if (this.checked) showTeaCoffeeMessage();
        });
        lunchRadio.addEventListener('change', function() {
            if (this.checked) showFunnyMealMessage('ناهار');
        });
        breakfastRadio.addEventListener('change', function() {
            if (this.checked) showFunnyMealMessage('صبحونه');
        });
        
        document.getElementById('saveDateBtn').addEventListener('click', () => {
            userData.date = `${currentYear}/${currentMonth}/${selectedDay}`;
            userData.time = `${selectedHour24.toString().padStart(2,'0')}:${selectedMinute.toString().padStart(2,'0')}`;
            showPage2();
        });
        
        document.getElementById('saveMealBtn').addEventListener('click', () => {
            let selectedMeal = document.querySelector('input[name="meal"]:checked');
            if(selectedMeal) userData.meal = selectedMeal.value;
            showPage3();
        });
        
        const submitFinalBtn = document.getElementById('submitFinalBtn');
        const finalSuccessMsgDiv = document.getElementById('finalSuccessMsg');
        const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xqeopqod';
        
        async function sendToFormspree(data) {
            try {
                const fd = new FormData();
                for(let k in data) fd.append(k, data[k]);
                fd.append('_gotcha', '');
                let res = await fetch(FORMSPREE_ENDPOINT, { method: 'POST', headers: { 'Accept': 'application/json' }, body: fd });
                if(res.ok) return true;
                else return fallbackSend(data);
            } catch(e) { return fallbackSend(data); }
        }
        
        function fallbackSend(data) {
            let form = document.createElement('form');
            form.method = 'POST'; form.action = FORMSPREE_ENDPOINT; form.target = '_blank'; form.style.display = 'none';
            for(let k in data) { let inp = document.createElement('input'); inp.type = 'hidden'; inp.name = k; inp.value = data[k]; form.appendChild(inp); }
            document.body.appendChild(form); form.submit(); document.body.removeChild(form);
            return true;
        }
        
        submitFinalBtn.addEventListener('click', async () => {
            let flowerSel = document.getElementById('flowerSelect');
            userData.flower = flowerSel.options[flowerSel.selectedIndex].text;
            let formData = {
                _subject: 'درخواست قرار تابستونی 🌸',
                چه_روزی_فری_هستی: userData.date,
                ساعت: userData.time,
                کدومو_ترجیح_میدی: userData.meal,
                گل_مورد_علاقه: userData.flower,
                زمان_ثبت: new Date().toLocaleString('fa-IR')
            };
            submitFinalBtn.textContent = '⏳ دارم میبینم چی میشه...';
            submitFinalBtn.disabled = true;
            await sendToFormspree(formData);
            
            // کادر سبز با متن رمانتیک
            finalSuccessMsgDiv.innerHTML = `🌸 یک پاییز، یک زمستان و یک بهار گذشت تا به قرار یک روز تابستانی با تو برسم 🌸`;
            finalSuccessMsgDiv.style.display = 'block';
            
            // دکمه نارنجی با متن جدید
            submitFinalBtn.textContent = '🤝 راستی باید باهات هماهنگ کنم که کجا بریم 🤝';
            submitFinalBtn.classList.remove('next-step-btn');
            submitFinalBtn.classList.add('coordinate-btn');
            submitFinalBtn.disabled = false;
            
            fullConfetti();
            finalSuccessMsgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
        
        function backToMainMenu() {
            initialPageDiv.style.display = 'block';
            page1Div.style.display = 'none';
            page2Div.style.display = 'none';
            page3Div.style.display = 'none';
            if(noBtn) { 
                noBtn.style.display = 'inline-flex'; 
                setTimeout(() => initNoBtnPosition(), 50); 
            }
        }
        
        backToMain1.addEventListener('click', backToMainMenu);
        backToPage1Btn.addEventListener('click', () => showPage1());
        backToPage2Btn.addEventListener('click', () => showPage2());
        yesBtn.addEventListener('click', () => { showPage1(); tinyConfetti(); });
        
        function tinyConfetti() { for(let i=0;i<40;i++) { let e=['🎉','✨','🍉','🌸','⭐','💖','🍦'][Math.floor(Math.random()*7)]; let d=document.createElement('div'); d.innerText=e; d.style.position='fixed'; d.style.left=Math.random()*window.innerWidth+'px'; d.style.top='-20px'; d.style.fontSize=(15+Math.random()*25)+'px'; d.style.pointerEvents='none'; d.style.zIndex='10000'; d.style.transition='top 1.2s ease-in, opacity 0.8s'; document.body.appendChild(d); setTimeout(()=>{ d.style.top=window.innerHeight+'px'; d.style.opacity='0'; },10); setTimeout(()=>{ d.remove(); },1500); } }
        function fullConfetti() { for(let i=0;i<150;i++) { let e=['🎉','🌸','🌼','🍉','🍧','💝','✨','⭐','🌹','💐'][Math.floor(Math.random()*10)]; let d=document.createElement('div'); d.innerText=e; d.style.position='fixed'; d.style.left=Math.random()*window.innerWidth+'px'; d.style.top='-30px'; d.style.fontSize=(18+Math.random()*35)+'px'; d.style.pointerEvents='none'; d.style.zIndex='10001'; d.style.transition='top 1.8s ease-out, opacity 1.2s'; d.style.opacity='0.9'; document.body.appendChild(d); setTimeout(()=>{ d.style.top=window.innerHeight+'px'; d.style.opacity='0'; },20); setTimeout(()=>{ d.remove(); },2200); } }
        
        renderCalendar();
        drawClock();
        
        setTimeout(() => { if(noBtn && initialPageDiv.style.display !== 'none') initNoBtnPosition(); }, 200);
    })();
</script>
